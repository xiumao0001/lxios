name: Build iOS IPA

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios-ipa:
    name: iOS IPA
    runs-on: macos-14
    env:
      NO_FLIPPER: 1
      IOS_SCHEME: LxMusicMobile
      IOS_WORKSPACE: ios/LxMusicMobile.xcworkspace
      IOS_BUNDLE_IDENTIFIER: cn.toside.music.mobile
      DERIVED_DATA_PATH: build/DerivedData
      ARCHIVE_PATH: build/LxMusicMobile.xcarchive
      IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
      IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
      IOS_MOBILEPROVISION_BASE64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
      IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
      IOS_BUNDLE_IDENTIFIER_SECRET: ${{ secrets.IOS_BUNDLE_IDENTIFIER }}
      IOS_EXPORT_METHOD_SECRET: ${{ secrets.IOS_EXPORT_METHOD }}
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Install dependencies
        run: npm ci

      - name: Install CocoaPods dependencies
        shell: bash
        run: |
          cd ios
          bundle exec pod install --repo-update

      - name: Read package version
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_VERSION_CODE=$(node -p "require('./package.json').versionCode")
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> "$GITHUB_ENV"
          echo "PACKAGE_VERSION_CODE=$PACKAGE_VERSION_CODE" >> "$GITHUB_ENV"

      - name: Build unsigned iOS app
        shell: bash
        run: |
          mkdir -p build
          set -o pipefail
          xcodebuild \
            -workspace "$IOS_WORKSPACE" \
            -scheme "$IOS_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            PRODUCT_BUNDLE_IDENTIFIER="$IOS_BUNDLE_IDENTIFIER" \
            MARKETING_VERSION="$PACKAGE_VERSION" \
            CURRENT_PROJECT_VERSION="$PACKAGE_VERSION_CODE" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build 2>&1 | tee build/xcodebuild.log

      - name: Show first Xcode errors
        if: failure()
        shell: bash
        run: |
          echo "===== Xcode errors ====="
          grep -n -C 3 "error:" build/xcodebuild.log | head -120 || true

      - name: Upload Xcode build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: build/xcodebuild.log
          if-no-files-found: ignore

      - name: Package unsigned IPA
        shell: bash
        run: |
          APP_PATH="$(find "$DERIVED_DATA_PATH/Build/Products/Release-iphoneos" -maxdepth 1 -name '*.app' -print -quit)"
          test -n "$APP_PATH"
          rm -rf build/Payload
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          (
            cd build
            zip -qry "lx-music-mobile-v${PACKAGE_VERSION}-ios-unsigned.ipa" Payload
          )

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LXMusic-unsigned-ipa
          path: build/lx-music-mobile-v${{ env.PACKAGE_VERSION }}-ios-unsigned.ipa

      - name: Release unsigned IPA
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.PACKAGE_VERSION }}
          prerelease: false
          draft: false
          files: build/lx-music-mobile-v${{ env.PACKAGE_VERSION }}-ios-unsigned.ipa

      - name: Install signing certificate
        if: ${{ env.IOS_P12_BASE64 != '' && env.IOS_P12_PASSWORD != '' && env.IOS_MOBILEPROVISION_BASE64 != '' && env.IOS_TEAM_ID != '' }}
        shell: bash
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/ios-build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/ios-build.p12"
          PROFILE_PATH="$RUNNER_TEMP/ios-build.mobileprovision"
          echo "$IOS_P12_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$IOS_MOBILEPROVISION_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          security cms -D -i "$PROFILE_PATH" > "$RUNNER_TEMP/profile.plist"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$RUNNER_TEMP/profile.plist")
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

      - name: Archive signed app
        if: ${{ env.IOS_P12_BASE64 != '' && env.IOS_P12_PASSWORD != '' && env.IOS_MOBILEPROVISION_BASE64 != '' && env.IOS_TEAM_ID != '' }}
        shell: bash
        run: |
          BUNDLE_IDENTIFIER="${IOS_BUNDLE_IDENTIFIER_SECRET:-cn.toside.music.mobile}"
          xcodebuild \
            -workspace "$IOS_WORKSPACE" \
            -scheme "$IOS_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_IDENTIFIER" \
            MARKETING_VERSION="$PACKAGE_VERSION" \
            CURRENT_PROJECT_VERSION="$PACKAGE_VERSION_CODE" \
            clean archive

      - name: Export signed IPA
        if: ${{ env.IOS_P12_BASE64 != '' && env.IOS_P12_PASSWORD != '' && env.IOS_MOBILEPROVISION_BASE64 != '' && env.IOS_TEAM_ID != '' }}
        shell: bash
        run: |
          EXPORT_METHOD="${IOS_EXPORT_METHOD_SECRET:-ad-hoc}"
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${EXPORT_METHOD}</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          mkdir -p build/export
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath build/export \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

          IPA_PATH="$(find build/export -maxdepth 1 -name '*.ipa' -print -quit)"
          test -n "$IPA_PATH"
          cp "$IPA_PATH" "build/lx-music-mobile-v${PACKAGE_VERSION}-ios-signed.ipa"

      - name: Upload signed IPA artifact
        if: ${{ env.IOS_P12_BASE64 != '' && env.IOS_P12_PASSWORD != '' && env.IOS_MOBILEPROVISION_BASE64 != '' && env.IOS_TEAM_ID != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: LXMusic-signed-ipa
          path: build/lx-music-mobile-v${{ env.PACKAGE_VERSION }}-ios-signed.ipa
